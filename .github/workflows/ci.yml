name: CI

on:
  push:
    branches:
      - "release/*"
      - develop
      - main
  pull_request:
    branches: [develop, main]

permissions:
  contents: write
  packages: write

jobs:
  ci:
    uses: mario-noobs/ci-baseline/.github/workflows/_ci-python.yml@main
    with:
      python_version: "3.10"
      test_enabled: true
      sonar_project_key: mario-noobs_face-ai-service
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker:
    needs: ci
    if: github.event_name == 'push'
    uses: mario-noobs/ci-baseline/.github/workflows/_docker-build.yml@main
    with:
      image_name: face-ai-service
      context: "."
